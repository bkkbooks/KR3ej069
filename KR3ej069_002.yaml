body:
  text: 卷二病機纂要嘗謂臟腑病因數變莫測暑濕風寒易辨經絡虛實先明心主驚而肝主風脾主困而肺主喘腎水為臟專主於虛肝實則兩目直視大叫呵缺項急煩悶瀉青丸須宜早啜肝虛則咬牙多缺氣熱外生氣濕內生地黃丸猶所堪裁叫哭發熱飲水搐降君火導赤瀉心困臥悸動體不安補心脾粉紅丸子脾實困睡身熱引飲水瀉黃散可服土虛吐瀉生風異功散益黃散堪嘗肺實悶亂喘促有飲水不飲水之分功成於瀉白金虛氣硬唇白有色澤色不澤之別效奏於阿膠腎本虛而無實目無光而畏明額解顱而面㿠白地黃丸而補腎虛大都筋脈統屬於肝熱盛則直視有準風生則連劄無疑風熱相攻反張而痓百日內發是曰胎驚真驚三發則死假驚何用求神或起於風寒跌撲或由於雞犬聲聞驚分急慢症別陰陽急者活而慢者危急宜涼而慢宜補抱龍丸鎮驚丸總在滾痰保生丹醒脾飲尤尊至寶咳嗽何因風寒痰火有聲無痰兮肺被火炎有痰無聲兮脾遭濕撓春作氣升夏火炎秋從濕熱冬寒滯痰臭結癰在肺午後嗽作陰虛久嗽龜胸須知莫如百合丹款花膏專除久嗽參蘇飲豁痰湯更治風寒夏傷暑而秋作瘧食生冷而結痰涎氣正氣交攻陰分陽分各別一日一發在陽分可行截法間一日發在陰分養正而痊痢多滯下有赤有白物積內而氣滯中白乾氣而赤乾血緑如菜色良由風濕之因黃而帶赤蓋是熱積所致瘀滲兜澀莫試通因通用為宜嘔吐因過飽沖寒痰火併胃虛所致煩渴挾暑肢冷中寒月里嬰兒吐乳卻緣何故哭聲未定乳之氣逆上行大都正胃調脾治法降痰下氣霍亂吐瀉並轉筋入腹日熱夜寒互激邪正難分轉筋者風生肝木大瀉者脾受濕侵吐乃火炎心上陰陽二氣相承暑濕霍冷為當寒兮姜附可稱小兒泄瀉食積之因水瀉皆緣濕盛完穀蓋是脾虛數至而便無糞泄名大瘕泄不泄而或多矢氣濕滯痰凝五苓散效如奔馬導滯湯速若驅霆疳之得名過食肥甘白膜遮睛發穗毛乾生癬疥青筋繞肚吃泥瀉痢脫肛門身寒身熱或吐或喘吃茶葉蟲居心上齧𪔿炭蟲食肝經腎則吃鹽面地膽則喜醋貪酸蟲若歸脾好吃土而並生米上行齧肺喜咬布以及衣裳長蟲寸白及蛔蟲此因宿食居脾胃蕪荑貫衆殺蟲聖藥肥兒脫甲疳積仙方驚痰乳食作塊而痛驚癖痰凝當心作痛痰癖多啼心上下痛壯熱疳癖身痛兼羸右脅塊如掌跡腑癖不動不遷移兩脅疼似杖形食疼而來往衝心除驚痰滾痰為上療積食消導居先驚積夜啼溺黃糞青風積目青露白壯熱乳積面黃乳罷哭而吐乳疳積身黃肚脹數為更衣驚要鎮心食須消導熱症故有多般要識陰陽虛實壯熱不言面赤心經獨受風邪氣熱傷肺濕熱傷脾參詳外感內傷亦有似瘧非瘧身熱惡熱尤飲水總屬內邪身熱惡寒不飲水皆為表症身熱頭疼惡寒無汗是傷寒頭疼身熱有汗惡風為風邪陰虛日輕夜重血上追尋陽虛日重夜輕氣中調理陰虛陽盛齧冰雪尚不知寒陰盛陽虛啜沸湯尤為不熱風寒表散食積下平虛宜補而實可瀉痰須豁而熱自清汗本於心內血外液自汗蓋屬陽虛盜汗卻緣陰竭黃耆六一散能令汗自滅咽喉腫痛潮起風痰雙單乳鵝痄腮喉痹急慢纏喉鎖口風痰火熱相煎腹痛因寒亦多火熱手不可近為實按之痛止為虛無休無歇為寒時痛時止為熱絞腸沙痛則口唇青黑手足青冷則危篤難醫當胸卻是心疼膈下積居胃脘小腹寒疼當臍食積膀胱虛冷無約制故令睡里遺尿小腸心熱入膀胱小便因而赤澀溺閉腹痛名曰盤腸小便溺血古稱風閉曰便濁曰癃閉疳火熱而客下焦曰雞燈曰砂疳陰囊腫而溺沙石欲解斯危清心導赤水腫之原土虧水泛氣化失度清於皮膚先喘先喘後脹起於肺先清金而後利水先脹先脹後喘起於脾先利水而後清金當分陽腫煩渴溺赤陰腫不渴溺白各別腰上腫發汗可散腰下腫利水可痊疹子之因天行熱毒泄瀉煩嘔昏悶足冷脈洪咳嗽輕則發為疹子重則變作斑爛錦文尚可黑斑死形赤瘤丹毒朵朵類若紅霞身熱腫痛昏昏目閉頭低頸上起過胸則死足上生過腎難醫雜症劇煩略舉其要庶後學知揭其提綱而闢其遄謬寒門總括歌百日胎寒與臟寒中寒內釣疝同看停傷食積留中脘吐瀉頻啼哯乳干小腹痛攻心與胃虛膨滿悶兩眉攢吐涎面白啼聲細寒戰唇青手足拳吐出不消純下白四肢厥逆夜滋煎如斯已上皆寒症萬勿因循變病端湯則理中加減用或投七服七香丸若能依此為施治起死回生是不難小七香丸此乃總要之劑能治小兒諸寒之病其藥皆溫暖之劑有益於脾胃者故皆可服之香附縮砂益智陳皮蓬朮俱用炒丁皮甘松為細末薑汁糊丸如黍米大理中湯治胃寒嘔吐心腹絞痛一切寒症人參白朮乾薑煨甘草炙加薑棗水煎凡治寒臟寒手足拳曲臉面青白腸鳴口冷聲細寒戰或口噤不乳加木香肉桂芍藥炒凡中寒腹痛疝氣者痛從小腹引至心胃口吐清水面色青白手足厥冷者加吳茱萸小茴香川楝青皮枳殼凡寒吐瀉者乳片不消多吐少出瀉痢青白小腹作痛者加木香半夏吐甚者加丁香凡脾胃受寒飲食雖少用即作飽不易消化加丁香山楂凡寒腹脹大虛膨青筋內痛喜食熱物加大腹皮檳榔木香凡奔豚疝氣乃腎氣之積寒自小腹下有物如筆管升上即痛加澤瀉良薑青皮木香凡哯乳者口角垂涎乳食不消化加枳殼藿香凡寒疝夜啼更盡則復臥哭多睡少天明則已腰曲額汗眼中無淚面色青白漸入盤腸加茱萸茴香凡盤腸內吊者身曲軀僂氣不舒暢加縮砂吳茱萸沒藥木香蔥白同煎熱門總括歌小兒生下胎受熱目祕胞浮大便結濕熱熏蒸遍體黃小便淋漓或見血滿口或疳或赤遊發喘咽痛木舌胎毒瘡瘍痛莫言多啼不乳呻吟劇諸症皆由壅熱為大連翹飲不虛設三黃化毒丹可兼頓命慈母生歡悅三黃丸上焦中焦蘊熱之症並宜服之大黃黃芩黃連為末水丸燈芯湯下五福化毒丹治小兒胎熱蘊熱胎毒口瘡玄參桔梗各五錢人參青黛各一錢赤茯苓馬牙硝各二錢甘草二錢麝香三分已上八味各為末蜜丸如芡實大每服一丸薄荷湯下大連翹飲治三焦積熱大小便不利目赤目腫丹毒口瘡重舌木舌咽痛瘡瘍蘊熱等症並皆服之連翹瞿麥滑石牛蒡車前木通山梔當歸防風黃芩荊芥柴胡赤芍甘草蟬退水煎服有加減法如下胎熱者加地黃胎黃者加茵陳目赤加黃連羌活小便澀者加豬苓大便祕者加大黃枳殼大便血者加地榆槐角枳殼小便血者加石蓮麥門冬生地丹毒遍體加黃連犀角胎毒瘡瘍加升麻當歸梢發頤加羌活白芷咽痛加桔梗薄荷重舌木舌加黃連犀角朴硝弄舌脾熱加石膏急驚歌熱甚生風作急驚卒然目劄有痰鳴面青臉赤頻牽引實熱涼驚與利驚金箔鎮心羌活散稀涎更下滾痰輕搐而不已頭多汗生死還期自曉明慢驚歌過服寒涼大病餘或因吐瀉久成之脾虛胃弱風邪入眼慢騰騰搐四肢面色白青身發冷痰涎額汗露睛微或兼下痢終難治藥用溫脾與補脾胎驚歌壯熱腮紅心不寧四肢抽掣冷痰生時時嘔吐身僵直半歲不由胎受驚又或項間生大塊此名驚風積而成消痰清熱先須理定魄安魂用鎮驚天吊驚歌天吊原由積熱生涎潮心絡又多驚雙眸翻上唇多燥項強痰鳴手爪青臍風撮口驚歌小兒臍風名不一胎風鎖肚吊腸疾更有卵疝共五般皆由濕熱風相擊口吐白沫手足冷唇白紫黑氣促極腹大青筋哭啼多撮口不乳四肢直藥用宣利使氣通珍珠奪命皆當急禁口驚歌禁風口噤不能啼胎中熱毒入心脾眼開舌間如粟粒不能吮乳受羈迷脾風驚歌脾風之候面額青舌短頭低又露睛睡里搖頭頻吐舌嘔腥口噤咬牙齦手足搐而兼冷厥十中九死沒痊平身冷身溫脈沉細醒脾一服見安寧發搐症歌發搐令人最可驚左視無聲右有聲女右無聲搐左有陰陽故爾兩相承五臟虛實觀前賦退熱除痰自有精盤腸驚歌盤腸氣痛腰背曲乾啼額汗冷雙足多因生下感風寒降氣沉香為可服內吊驚歌內吊腹痛多啼哭唇青囊腫體傴僂反張眼有紅筋起寒結胎中更積驚凡治諸驚先要行痰一見牙關口噤先將稀涎散用白湯調一二匙灌服如口噤不能下咽者即從鼻管中灌入牙關稍舒即以鵝翎蘸薑汁頻探喉得吐風痰隨進滾痰丸使其痰下降然後用四磨湯行其氣氣行則痰亦行稍得蘇醒以金箔鎮心丸抱龍丸次第與服如痰盛不得吐用薑汁竹瀝三四匙灌之又以搐鼻散捻紙條蘸藥取嚏依法而行如不嚏或啼聲不出口噤不食額汗如珠遺尿噴藥者決不可治也抱龍丸滾痰丸二方見前金箔鎮心丸此方藥性中和能截風定搐化痰鎮心安神急慢驚風慢脾胎驚天吊皆治之雄黃五錢硃砂三錢天竺黃五錢膽星一兩茯苓五錢防風三錢白附三錢牛黃一錢另研真麝香一錢另研山藥三錢蟬蛻十四個全蠍十四個去土片腦三分金箔五十片殭蠶二十條炒去絲為末大米糊為丸金箔為衣稀涎散痰壅咽喉牙關緊閉用此開之豬牙皂角明礬如要吐加瓜蒂等分為末每服一匙白湯灌下搐鼻散半夏細辛各二錢荊芥七分牙皂三錢麝香一分上為末用紙條蘸藥取嚏為效四磨湯能行氣行痰檳榔木香枳殼烏藥上四味不切但用薑湯水磨服人參羌活散截風定搐豁痰安神柴胡獨活天麻前胡人參甘草地骨皮川芎枳殼茯神羌活桔梗陳皮防風殭蠶蟬蛻加薑汁竹瀝煎凡痰盛加南星瀉者加訶子澤瀉大便結加皂角昏迷不醒加黃連壯熱加黃芩嗽加杏仁天吊加鉤藤心跌加當歸目連眶瞤動乃肝風盛也加青皮黃連胸膈不寬加枳實醒脾飲治慢驚慢脾風人參白朮茯苓厚朴橘紅甘草半夏藿香天麻木香乾薑蓮肉薑棗陳米百粒同煎言語不出者加石菖蒲瀉者加訶子四肢厥冷加附子搐者加全蠍蟬蛻珍珠丸治驚風撮口一日一丸至七日用七丸南星炮天麻白附二錢炒膩粉五分巴霜一匙蕪荑滑石全蠍麵炒各二錢半上為末糊丸麻子大薄荷湯送下奪命散赤腳蜈蚣一條去頭足炙焦麝香少許為末豬乳調服保命丹治胎驚內吊肚腹緊硬睡臥不安多啼一切風痰全蠍十四個去毒防風二錢殭蠶去絲天麻各二錢南星泡白附子麝香五分金箔十片蟬蛻硃砂各一錢熱症加牛黃腦子硼砂上為末米糊丸每兩作四十丸乳香丸治驚風內吊腹痛多啼乳香五分沒藥沉香各一錢蠍梢十四個雞心檳榔一錢五分上為末煉蜜丸如梧桐子大每服二丸菖蒲鉤藤湯調下當歸散治小兒夜啼者臟寒而腹痛也面青手冷不吮乳是也宜此方當歸去節白芍藥人參各一錢半甘草炙桔梗橘皮各一錢半去白上為末水煎半盞時時少與服又有熱痛亦啼叫不止夜發面赤唇焦小便黃赤與三黃丸人參湯下沉香降氣湯滯氣胸膈痞塞心腹脹滿喘促短氣乾噦煩滿咳嗽痰涎香附子一兩半炒去毛沉香一錢砂仁三錢甘草七錢半上為末每服一錢入鹽少許沸湯點之清懸霧露空心服之去邪惡氣使無瘴疫至寶丹治諸癇急驚心熱客忤煩躁風涎搐搦生犀屑生玳瑁屑琥珀研細水飛雄黃研水飛各一兩金箔五十片半為衣銀箔五十片片腦研麝香各一錢研細牛黃半兩研安息香一兩半為末以無灰酒濾去砂石約取一兩慢火熬成膏上生犀屑玳瑁搗為細末研入諸藥令勻將安息香膏湯煮過和搜為劑如干即入熟蜜磁器中旋化為丸如梧桐子大每服二丸人參湯下急慢驚風不治歌驚風睛定要推求口噤聲焦脈數憂眼合不開並竄瞪面緋面黑手難收口張吐沫氣粗大髮直搖頭汗不流齁䶎喉鳴鼻端冷遺尿瀉血並皆休驚癇症歌牛馬豬羊雞五癇須識驚風食與痰角弓反張目直視目瞪吐沫閉牙關五形五臟須分曉牛黃丸可取風痰五色丸硃砂另研珍珠末各五錢水銀二錢半一作三兩雄黃一兩一作三兩黑鉛二兩同水熬按用黑鉛二兩水銀當作二兩者為是無疑矣上煉蜜丸如麻子大每服三四丸煎金銀薄荷湯下細辛大黃湯治風癇內熱天麻防風各半兩細辛大黃焙川芎各二錢半甘草炙一錢半上銼散每服一錢入犀角少許煎服牛黃丸治風癇迷悶搐掣涎潮牛膽南星全蠍六個蟬蛻各二錢半防風白附子天麻直殭蠶炒各錢半麝香上為末以煮棗肉根水銀五分入藥為丸緑豆大每服二丸荊芥生薑湯下七寶鎮心丸治驚癇心熱遠志肉薑汁焙雄黃鐵粉琥珀硃砂各一錢金銀箔二十片麝香少許上為末棗肉丸梧桐大每服一丸麥門冬煎湯下傷寒門總括歌傷寒六脈皆浮緊虎口三關紋紫紅發熱惡寒腰脊強頭疼吐逆悶煩攻夾驚臥睡時驚掣夾食餿酸噎氣充無汗必須微解散太陽莫使過經凶治法用抱龍丸春用參蘇飲二方俱見前十神湯治感傷寒川芎白芷麻黃陳皮紫蘇香附升麻乾葛芍藥甘草加薑棗煎服有汗去麻黃熱盛加黃芩咳嗽加半夏杏仁咽痛加桔梗發譫加柴胡黃芩泄瀉加訶子木香吐逆加薑汁半夏頂痛加羌活藁本裡熱甚則大便燥結加大黃大便結加枳實便血加桃仁傷風門總括歌傷風貪睡面青黃呵缺頻頻熱似湯口吐氣來渾似火鼻流清涕嗽生痰法當解表消痰嗽加減參蘇飲正當便用抱龍兼錠子霎時雲散日回光咳嗽歌咳嗽皆因風入肺重則喘急熱不退肺傷於寒嗽多痰傷於熱者聲壅滯寒宜發散熱則清實當瀉胃虛補肺嗽而不已便成癇痰盛不已驚風至眼眶紫黑如傷損嗽而有血難調治疏風豁痰補瀉明款花膏子妙通神辰砂抱龍丸此劑乃利驚疏風豁痰清熱中和之藥為活幼之首方也治急慢驚風脾風傷寒傷風咳嗽生痰喘急昏沉發熱鼻流清涕或吐瀉風暑十種熱症睡中悸掣痧疹斑瘡胎風胎驚胎熱百病皆治天竺黃四錢須要嫩白者佳牛膽星三兩四錢五分為衣雄黃秋冬三錢余減半麝香三分痘疹中不用甘草三錢天麻五錢防風三錢硃砂四錢一半痘疹時行加天花粉四錢上為末蜜丸芡實大雪水糊丸尤佳薑湯或薄荷湯下保生錠子治急慢驚風痰涎壅盛搐搦膽星白附子泡辰砂水飛各一錢麝香二錢另研天麻泡防風全蠍去尖羌活各五錢蛇含石煅四次水飛四兩金箔十三片為衣為末大米糊作成錠每服半錠薄荷湯下定喘紫金丹此方專治喘嗽氣急之症藥有大毒量情用之可也淡豆豉一兩人言一錢將豆豉浸四五日已軟研爛和人言為丸緑豆大每歲一丸臨臥冷茶送下疏風化痰丸治小兒風痰咳嗽驚熱及喘半夏一兩泡南星二兩薑製白附子一兩明礬五錢上為末大米糊為丸黍米滑石或辰砂為衣礞石滾痰丸此方非獨治痰有功利積尤妙但脾虛者勿用青礞石大黃酒蒸兩半黃連兩半沉香五錢上為末水丸黍米大每二三十丸白湯下加味參蘇飲治尋常外感並痧疹前後悉用人參紫蘇柴胡陳皮甘草枳殼前胡白芷半夏桔梗乾葛茯苓青皮加薑蔥煎服本方用參亦當量情病者體虛胃寒則用餘症去之肺熱因不利者加黃芩初起發熱痘疹者加升麻痰盛者加南星竹瀝壯熱者加黃芩風盛似欲發搐者加防風天麻項背拘急加獨活頭痛加川芎細辛鼻塞加細辛白芷初嗽加麻黃杏仁痰壅熱盛加桑皮葶藶久嗽加杏仁五味貝母肺虛唇白而嗽不能接氣者加人參阿膠糯米初時感冒欲冷取汗發散者加麻黃蒼朮春冬感冒風寒而甚者倍加羌活風寒已經發散惟熱不愈者另用小柴胡湯去本方豁痰湯治感冒或驚風痰盛者用之南星半夏橘紅紫蘇黃芩枳殼前胡桔梗杏仁加薑汁竹瀝煎服風痰吐涎加防風食積痰面黃少食或多食即飢皆胃熱而化為痰吐出黃色而稠黏者加神麯麥芽山楂熱痰是一向熱而不已肺受其熱則吐出成塊者加山梔子天花粉結痰加瓜蔞仁濕痰加白朮寒痰喘而嗽者加麻黃乾薑款花湯治痰嗽久而不止者如神款花茯苓杏仁桑皮五味貝母紫蘇烏梅各等分蒸過舂爛取肉研和前藥末加乾薑共為末蜜丸薑湯煎服天麻五錢山藥二兩款花三兩阿膠五錢粟殼二兩去蒂烏梅肉三兩桑皮六錢麻黃五錢杏仁二兩如前丸服斑疹門總括歌疹如麻子斑如錦水痘如珠赤痘紅四症總因風與熱各分調理莫相同加減四味升麻湯此升發之劑但宜一二服則當止多用則過表升麻葛根芍藥甘草防風桔梗紫蘇蒼朮陳皮枳殼柴胡姜棗引水痘赤痘即此一服不用加減見疹熱不退加玄參嘔吐加藿香瀉甚者去蒼朮枳殼加訶子肉果咳嗽有痰加半夏桑白皮杏仁五味子瀉痢後內虛加茯苓白朮腹痛加蒼朮鼻衄加茅花生地譫語加黃芩傷寒斑疹不治歌病人目陷口開張身臭唇青命不長更看人中反向上爪甲青黑命將亡口中冷氣出無歸斑黑昏沉不透肌髮直毛焦兼喘急汗如珠子定難醫吐瀉門總括歌小兒吐瀉何以分傷食冷熱風所因肚熱腳冷不飲食日晡潮熱往來生面黃腹痛餿酸吐瀉而不化兼臭腥急須消導香稜劑七香丸子效通靈冷吐乳片不消化多吐少出瀉痢清木香豆蔻還須服五苓湯散服當經夏月暑濕唇臉紅吐少出多瀉發筒心煩口渴小便赤不須加減多神功七香丸治吐消積溫胃效方見前香稜丸消積溫脾川楝茴香蓬朮各一兩炒木香三稜青皮各五錢丁香一錢枳殼一錢麵炒上為末醋糊丸如緑豆大每服一二十丸木香豆蔻丸治吐瀉訶子四兩煨乾薑三兩煨木香五錢豆蔻五錢上為末麵糊為丸如芡實大夏月減乾薑加白果黃連冬月依本方加減五苓散分理陰陽豬苓澤瀉白朮茯苓肉桂少許薑棗煎吐瀉並作加藿香白朮蒼朮寒吐寒瀉則乳片不消下利清白腹疼加煨乾姜腹痛加煨芍藥熱吐熱瀉則吐利黃水瀉下如筒加炒黃連芩久瀉加訶子肉果久吐加丁香宿食不消吐瀉餿酸腥臭加楂子神麯麥芽枳殼傷食甚者加檳榔草果小便不利加滑石木通吐瀉久而成虛渴加人參麥門冬天花粉脾胃受濕倍加白朮半夏飲食不進加益智大腹皮虛脹加萊蔔子大腹皮胃口作痛加草果豆蔻木香山楂胸膈飽悶加枳實飲食不消者加枳實生痰去桂加橘紅小便自利去豬苓夏傷暑加黃連白扁豆小腹痛加鹽炒茱萸胃氣不足加人參炒黃米煨芍藥吐瀉不治歌唇紅作瀉肛如石神脫口張渾不食汗流作喘腹常鳴面色昏沉齒露黑脈洪身熱吐蛔蟲魚口鴉聲並氣急吐利不止常脫肛吃下藥物隨時出有藥不投定歸冥良醫一見須拋擲瘧疾症歌小兒瘧疾多因食邪正交攻寒熱逼截之太早反不良初乃清脾飲消釋次進截瘧不二飲神功一服如金石清脾飲消導宿滯和順陰陽青皮蒼朮厚朴陳皮甘草茯苓半夏柴胡黃芩草果枳殼紫蘇川芎香附薑棗煎服截瘧不二飲檳榔草果知母貝母陳皮枳殼蒼朮半夏柴胡常山烏梅上用水酒各半姜三片煎半盞露一宿明日五更溫服瘧疾不治症歌荏苒經旬瘧不除更加瀉利悶如癡蒸蒸作熱渾身瘦肚大青筋鼻似煤飲食未嘗潔口腹囟門填陷項常垂生痰喘急時加嗽縱有良工不可醫痢門總括歌向因積久多成痢濕熱肥甘滯所為或赤或黃或下白要分氣血屬何之從前導氣湯先用次後香連養臟施噤口刮腸當介意平調臟腑治須知導氣湯痢疾初起先進此藥去其宿垢然後調和臟腑檳榔枳殼黃連甘草芍藥厚朴升麻山楂神麯稟厚者加大黃芒硝上㕮咀姜三片水煎溫服香連丸宣黃連二兩用吳茱萸二兩同炒去吳茱萸不用木香三錢上為末神麯糊丸如緑豆大每服三十丸養臟湯此藥平調臟腑去積和中白朮厚朴陳皮茯苓甘草檳榔枳殼木香黃連川芎芍藥蓮肉訶子加薑棗同煎赤痢加地榆當歸白痢加乾薑赤白相兼加當歸乾薑純血加生地當歸地榆黃芩腹痛加乳香沒藥久痢加粟殼蜜炙噤口加石蓮糯米乾嘔加藿香發熱加柴胡知母元氣下陷加人參柴胡胸膈不寬加砂仁作渴加麥門冬五味子天花粉裡急後重加枳殼木香小便不利加滑石豬苓澤瀉痢疾不治歌糞門如筒脈洪數發熱不食兼作渴瀉下渾如爛魚腸豆汁屋水交相錯汗出如油啼不休肚腹疼痛陰囊縮或如癰膿雞子臭有藥莫投修棺槨疳積門總括歌心肺肝脾腎五疳形容羸瘦發毛干四肢枯細尿如乳肚大筋青飲食貪心症口乾時燥熱虛驚面赤更心煩搖頭揉目睛生膜髮直筋青熱在肝咳嗽氣粗多喘急肺家灑淅熱仍寒遍身瘡疥形如鬼足冷齦宣把腎參腹滿氣粗頻泄利脾虛偏愛土泥飧潮熱骨蒸多盜汗勞疳羸瘦面黃顏脊疳脊骨如刀鋸指背生瘡可驗看腦熱囟高疳在腦乾疳乾渴大便難熱疳便澀身如火泄利頻頻認作寒齒癢多啼唇口紫蛔蟲盤結胃腸間丁奚項小並胸陷肉削尻高臍又翻哺露往來虛熱甚頭開嘔吐胃中關無辜腦項因生核不破須知治療難五疳消積肥兒劑脫甲同投便見安五疳消積散三稜蓬朮各一斤神麯麥芽青皮山楂川楝黑醜檳榔各二兩陳皮一斤萊蔔子四兩上為末麵糊為丸如緑豆大每服二三十丸米湯下肥兒丸胡黃連蘆薈麥芽蕪荑各二錢使君子宣黃連木香檳榔肉果煨去油各五錢神麯白朮茯苓各一兩續加秦艽地骨皮龍膽草各一兩胃弱者加人參五錢上為末醋糊神麯為丸芡實大每服二十丸脫甲散治骨蒸晡熱五疳羸瘦夾驚夾食傷風傷暑傷積大小便閉塞傷寒發熱口渴等症柴胡當歸龍膽白茯苓人參甘草川芎麻黃知母加連須蔥白同煎上十味知母當歸順正陰陽人參甘草和脾益胃柴胡川芎去寒邪茯苓膽草止渴生津麻黃去節留根功全表裡驚癇之候用之立見效疳積不治歌疳極丁奚哺露時腹膨臍突面黃羸吐蟲瀉臭頭開解鶴膝伶仃總莫醫傷積總括歌積因停滯在胸中乳食虛驚氣所鍾腹痛面黃晡作熱尪羸煩渴瀉流通飲食不化酸腥吐復以滋煎兩目紅急用香稜消積劑莫教日久致頭空香稜丸消積丸二方俱見前加減流氣飲治胸膈痞塞氣不升降喘急不安積聚沉滯發熱不思飲食噫氣吞酸或祕或利等症木香枳實蓬朮陳皮青皮檳榔三稜蒼朮草果大腹皮大便閉加大黃身熱加柴胡內熱加黃連胃中作痛加炒益智仁草豆蔻腹脹小便不利加桑皮茶葉嘔吐加藿香半夏傷冷積滯加乾薑肉桂砂仁脾胃門總括歌脾屬陰兮胃屬陽一身牆壁作中央土生萬物須和暢一有虧兮雜病干或吐或膨時泄瀉或煩或渴不加飧常吞助胃溫脾藥生冷休貪便見安助胃膏專治脾胃不正或吐或瀉飲食少進面黃唇白虛煩作渴之症木香乾薑炙草各三錢山藥蓮肉去心白朮茯苓各一兩肉果訶子各四錢神麯麥芽各五錢人參二錢砂仁二錢丁皮白豆蔻各一錢上為末蜜丸芡實大人參養胃湯蒼朮厚朴陳皮炙草茯苓半夏芍藥人參白朮加薑黃米同煎嘔吐加藿香木香瀉加肉果訶子腹脹加枳殼大腹皮不思飲食加益智腫脹門總括歌小兒腫脹脾家濕臟腑氣虛即或極或因停積於胃中或因瘧痢虛而得疳氣痞塊或血虛飲食飢飽皆為積醫人審察盛與衰分氣補虛不可失有積當與漸消之固本正標方是的陰囊無縫掌無紋臍突如李面黧黑唇焦口燥脈不來有藥莫投徒用力分氣飲治四肢浮腫氣喘短急桔梗茯苓陳皮桑皮枳殼大腹皮草果半夏蘇子木通木香小便不利加豬苓澤瀉腹瀉加肉果腹痛加肉桂胸膈不寬加砂仁上各加薑棗燈芯同煎補脾飲治脾虛受濕浮腫及吐瀉痢後皆服之人參白朮茯苓厚朴陳皮甘草木瓜青皮木香乾薑砂仁大腹皮上㕮咀加薑棗燈芯同煎自汗盜汗大汗症歌小兒盜汗不須醫額汗至胸亦陽虛更有胸下當臍汗此汗皆因脾胃虛傷寒瘧疾皆將愈汗分四症分明起蒸蒸振汗不戰栗若還戰栗汗兼耳止汗散治睡而自汗故蒲扇火燒存性去火毒研末每服三錢溫酒下黃耆六一散黃耆六錢甘草一錢上為細末滾水下腹痛症歌腹痛多緣乳食積邪氣正氣相交擊挾寒挾熱亦其因面赤壯熱知端的面青肢冷是因寒清熱溫涼積消息消積丸丁香九粒砂仁十二個巴豆去油淨上為細末面丸如黍米大每服二三丸溫水下四順飲治挾熱腹痛赤芍藥當歸甘草大黃各等分欲利小便用赤芍藥虛熱加甘草下利減大黃胃風邪加去節麻黃中風體強直眼上視加獨活水煎溫服七氣湯治氣道壅塞攻衝作痛半夏五兩制人參辣桂各二兩甘草陳皮香附加乾薑生薑三片棗三枚水煎服蛔蟲痛歌小兒腹痛是蟲攻多食肥甘故長蟲口涎吐沫兼清水唇鼻人中黑氣衝集效丸治蟲痛木香鶴蝨檳榔訶子煨附子去皮臍蕪荑乾薑大黃兩半炒烏梅二錢半上為末煉蜜為丸陳皮醋湯下一方用雞子炒白蠟陳酒糊丸服一方用楝根白皮用二陳湯同煎服夜啼客忤驚歌夜啼臟冷使之然腹痛多啼作熬煎心經煩熱小便赤臉紅舌白熱之根客忤卻緣神氣嫩外邪異物忤其前驚啼口吐青黃沫瘛瘲如癡喘息牽火花膏治壯熱夜啼冷痛清油燈花七顆塗乳上令兒吮之碧霞散治壯熱夜啼柏葉半斤南星殭蠶全蠍鬱金雄黃各一錢上為末每服一錢薄荷蜜水調蒸變症歌小兒臟腑未全成長養之時作變蒸變則氣升蒸則熱八蒸十變便成人益氣散治變蒸氣升木香白朮人參茯苓防風川芎上㕮咀姜三片艾二枚水煎溫服惺惺散見痘症方治變蒸發熱咳嗽解顱總括歌腎經主髓腦為海頭縫開時腎氣虧面多㿠色睛多白長而少笑瘦而羸須服地黃丸補腎柏子三辛救此危地黃丸見後方內柏子仁散治頭顱不合防風二兩柏仁一兩上為末乳汁調塗三辛散治腦角大囟不合細辛桂心各半兩乾薑一錢上為末乳汁調塗囟上干時再塗面赤是效囟陷症歌小兒囟陷因何致熱渴引飲成瀉痢積久因而氣血虛髓不能充有若是狗頭骨散治囟陷黃狗頭骨用火炙黃為末以雞子清調敷地黃丸方後見囟填症歌囟填之症囟門高飢飽無常乳不調或寒或熱乘脾胃臟腑不和自汗澆氣則上充填滿起囟腫如堆短髮毛大連翹飲見前柴胡散治囟腫及傷寒表症石膏黃芩甘草赤芍葛根各二錢半麻黃去節柴胡半兩上㕮咀每服二錢入生薑少許蔥三寸赤遊風症歌赤瘤丹毒從何起只因熱毒客腠理氣血相摶發皮膚緣母過食煎炒取烘衣未冷與之穿赤腫遊行至遍體白玉散見後方防風散防風半兩朴硝犀角黃芩黃耆升麻各二錢半上為末竹葉湯下語遲症歌小兒長大不能言在母胎中驚怖然邪氣乘心舌無力故令遲語受熬煎菖蒲丸治心氣不足舌本無力遲語石菖蒲丹參各一錢赤石脂三錢人參去蘆半兩天門冬去心二錢上為末蜜丸麻子大滾水食後服或加黃連滯頤症歌口為脾竅液津兮涎流出口滯於頤只為脾虛無約制溫脾溫胃世間稀溫脾丹治滯頤半夏曲丁香各一兩乾薑白朮青皮陳皮各半兩木香一兩上為末糊丸如黍米大每歲十丸米湯下溫胃散治滯頤半夏人參去蘆甘草乾薑肉豆蔻白朮各半兩丁香一錢上為末每服二錢生薑煎水食前服癩頭瘡症歌小兒出生癩頭瘡滿頭邋遏出濃漿父母胎前恣情欲致兒生下受災殃通聖散大黃酒炒共為末以酒拌焙乾每服一錢水煎服以白炭燒紅淬入水中乘熱洗之脫蛻散洗淨敷上胡荽子伏龍肝烏龍尾黃連白礬上為末以麻油調敷濕則干滲一抹散松皮燒存性二兩黃丹水飛一兩白礬火枯五錢大黃三錢輕粉四錢白膠香水飛傾石上一兩上為末香油搽一掃丹以水洗淨後敷藥松香四兩麻油四兩上將青布捻成條入松香於內將麻油浸透以器盛之兩頭著火滴油於器內取搽效丹溪治一小兒二歲滿頭生瘡一日瘡忽自陷遂患痰喘知其為胎毒也詢其母孕時多食辛熱之物遂以人參連翹黃連甘草陳皮川芎芍藥木通濃煎入竹瀝服之數日而安重舌木舌弄舌心竅出舌而主血脾之經絡出於舌二經有熱舌重生弄舌單主脾家熱木舌腫如豬舌同心脾積熱無差迭蒲黃散治重舌竹瀝調蒲黃末敷之黃柏丹黃柏不拘多少用竹瀝浸水點之效治木舌方黃葵花研細一兩黃丹五錢上二味為細末點七次無有不效獨腦散治舌腫滿口用梅花腦子點舌即消瀉黃散方見後治弄舌水煎服鵝口口瘡重齶歌白屑滿口如鵝口熱盛心脾發口瘡胎毒熏蒸之所致上齶懸癰著承漿此名重齶因脾熱急宜刺破免生災瀉心湯方見前用蜜水調服或用柏末敷效或用白楊木燒瀝敷之調黃散治白屑滿口枯礬一錢牙硝五錢硃砂二錢上為細末每服一字取鵝口涎調塗舌上先以手指纏亂髮拭垢淨然後敷藥效鵝口方用地雞擂水塗之效即磚下扁蟲也或用飛丹摻之辰砂七保散治舌上生瘡壯熱傷風等症麻黃去節白朮當歸大黃赤芍荊芥前胡生地甘草各等分上為末用薄荷煎湯下傷風發散用生薑驚用辰砂牛黃散治重齶玄精石一兩鉛霜五錢龍腦硃砂牛黃各二錢半上為末用針刺破出血莫令入喉鹽水洗淨敷藥龜胸龜背歌肺經受熱致龜胸胸上高如龜脊同脹滿攻於胸膈上母食辛溫熱乳沖客風入脊成龜背龜尿點脊有神功百合丹治龜胸大黃天門冬杏仁去皮尖另研桑白皮葶藶炒百合木通各等分上為末瀉白散見後取龜尿法以荷葉盛龜用鏡照之尿自出行遲大法歌小兒五百日當行蒸變才周骨始全二三五歲尤難走肝腎虛而骨不堅腎不扶肝筋力弱五茄虎骨走天邊五茄皮散五茄皮散一加皮二木瓜同牛膝宜米飲更浸些小酒食前調服治行遲虎骨丸虎骨丸中虎骨湯桂芩生地膝芎當棗仁煉蜜丸吞下子女行遲用此方脫肛症歌肺氣虛時脫出肛小兒此症不須慌瀉痢久而氣下墜澀腸文蛤好推詳脫肛方用陳壁土泡湯熏洗效用五倍子為細末敷而頻托入效用鱉頭澆存性香油調敷或燒煙燻之澀腸散治久痢大腸脫出赤石脂訶子去核龍骨各等分上末臘茶少許和藥摻上絹帛揉入治痢米湯調下遺尿症歌小兒遺尿細推詳腎膀虛弱致其殃清冷氣虛無約制故令不禁溺於床益智神苓散益智生白茯苓去皮茯神去皮各等分上為末空心清米飲調下加味地黃丸生地黃酒洗一兩白茯苓二兩山藥一兩破故紙研炒山茱萸肉二兩牡丹一兩澤瀉一兩肉桂五錢益智研人參各一兩上為末煉蜜為丸如芡實大鹽湯送下兼服肥兒丸效小兒脫囊陰囊腫大墜下而不收也亦有囊皮脫爛者木通甘草黃連當歸黃芩上等分水煎食前服囊爛者以野紫蘇葉面青背紅者是為末香油調敷皮脫睪丸露者外以青荷葉包之敷藥自生皮小兒臍中汗出並痛用枯凡干敷或用柏末敷治泄瀉不止硫黃滑石共為末米飲調下一方治撮口殭蠶為細末蜜調塗妙奇方治泄瀉胡椒為細末薑汁調敷臍妙奏效方錢氏瀉青丸治目直大叫項急煩悶肝實症也羌活膽草當歸梔子防風去蘆川芎大黃紙包煨上為末煉蜜為丸雞子大每一丸竹葉煎湯調下地黃丸治咬牙寒戰肝虛症也山茱萸牡丹皮山藥澤瀉熟地黃酒洗白茯苓各四錢上為末蜜丸梧桐子大空心服五七丸溫水下瀉心湯治叫哭發熱飲水而搐心實症也黃連一兩去蘆上為末每服一錢溫水下導赤散治法同前木通甘草生乾地黃各等分上為末每服二錢淡竹葉湯下粉紅丸治困臥悸動不安心虛症也硃砂一錢五分研天竺黃五錢龍腦一錢另研牛膽南星四兩胭脂一錢上為末牛膽汁和丸如彈子大砂糖水溫服瀉黃散治困睡身熱弄舌脾實症也山梔仁二兩石膏五錢甘草六錢防風七錢去蘆藿香七錢上為末每服一錢燈芯湯下異功散治吐瀉生風虛冷不飲乳脾虛症也人參白朮白茯苓甘草陳皮上為末每服一錢薑棗煎湯下瀉白散治悶亂喘促或飲水肺實症也桑白皮去皮一兩炒甘草半兩炒地骨皮一兩焙上為末每服一錢水一鍾粳米一合煎至七分空心服阿膠散治嗽喘咆哮昏沉肺虛症也阿膠一兩麵粉炒甘草三錢黍黏子一錢炒杏仁七個去皮尖糯米一兩馬兜鈴五錢上為粗末每服二錢白水煎服益黃散治脾虛冷積不能消食陳皮青皮訶子肉甘草各五錢丁香二錢每服二錢白水煎服六一散治傷暑濕降痰助脾滑石六兩粉甘草一兩止汗加黃耆三錢一方加辰砂上為細末滾水湯下清涼散治潮熱效銀柴胡胡黃連等分上為末燈芯湯下丸亦可還魂丹治急慢驚風吹鼻二寸蜈蚣一個蝦四兩白芷與天麻再加二字黃花子死在陰靈要返家青丸子化痰青黛五錢南星炒過五錢巴霜五分紅丸子下痰硃砂一錢水飛過半夏薑製五錢巴霜五分白丸子吐痰白附子五錢生用寒水石硝煅半兩巴霜五分黃丸子瀉痰大黃煨過五錢鬱金五錢巴霜五分化痰丹治食積痰氣瘧痢又名化鐵丹八梅十六豆一豆三胡椒青陳各半兩醋打麵糊調加上萊蔔子青木不相饒小兒多食積是鐵化能消上為末糊丸如緑豆大隨宜用引千金丸治小兒蟲積氣肚痛棗肉十個去核巴霜一錢沒藥一錢木香一錢乳香一錢上共碾成丸緑豆大五七丸滾白湯送下平胃丹治食不消疳積膨脹鴨溏山楂肉一錢神麯一錢白朮一錢青皮二錢甘草八分白茯苓一錢厚朴二錢三稜一錢酒炒莪朮一錢酒炒黃芩一錢酒洗香附一錢童便炒蒼朮一錢米泔浸陳皮一錢去白上為細末糊丸如彈子大每服一丸薑湯下降痰丸防風六錢去蘆茯苓五錢輕粉一錢硃砂錢半青黛一錢蟬退四十個水洗獨活三錢殭蠶三十炒全蠍三十水洗南星一錢青礞石五錢火煨用焰硝在內封固火煨上為細末糊丸如粟米大一服三五丸滾湯下牛黃鎮驚丸治驚風急驚諸症天麻五錢白朮二錢遠志五錢白附二錢柴胡五錢麝香一字全蠍三十水洗川芎五錢代赭一兩醋煮礞石火煅五錢麻黃五錢去節天竺黃四錢沉香五分獨活一錢硃砂五分防風五錢蟬退五錢牛黃三錢荊芥五錢粉甘五錢殭蠶五錢犀角一錢珍珠三分腐煮琥珀三分上為末糊丸如梧桐子大金箔為衣隨症用引每一丸弭風丸治急慢驚風全蠍十四去毒殭蠶二錢去絲白附二錢天麻三錢巴豆十四去油硃砂二錢防風三錢牛黃一錢金箔二十為衣茯神唇砂上為末米糊為丸粟米大一歲一丸燈草湯下紫金錠滑石二兩丹皮煮過膽星二錢山藥二錢蜈蚣一條去頭足殭蠶五錢全蠍二十白茯苓一兩上為末用麻黃四兩甘草四兩熬膏為丸如芡實大硃砂五錢為衣或用金箔急驚薄荷燈心湯下慢驚薑湯下八仙湯家傳祕方不拘小兒百疾皆治引經開後巴霜一錢硃砂五分鬱金五分乳香三字沒藥三字沉香五分木香四分雄黃六分上為末滴水為丸如粟米大每服二三丸隨宜引驚癇發搐金子湯下潮熱變蒸燈芯湯下傷風傷寒薑汁湯下痰涎齁䶎薑汁竹瀝湯下食積肚痛山楂麥芽湯下瘧疾燈芯竹葉麥芽湯下痢疾泄瀉薑汁湯下散風醒脾丸家傳慢驚祕方蟬退炒防風全蠍炒麝香硃砂天麻炒白附各五錢金箔五十片上為末飯為丸如緑豆大金箔為衣服一二十丸一七散一片硃砂一片雪七個殭蠶七個蠍不論急驚與慢驚調時須用人生血豆蔻丸胡黃連五錢神麯五錢麥芽五錢檳榔三錢木香二錢肉豆蔻麵包煨使君子肉各一錢上為末醋糊神麯為丸每服二十丸米湯送下肥兒丸胡黃連五錢神麯五錢麥芽五錢檳榔三錢木香一錢肉豆蔻麵包煨使君子肉各三錢上為末神麯陳米糊為丸每服二十丸米湯下加減肥兒丸蟾酥一個酥炙白朮土炒陳皮檳榔蕪荑去殼胡黃連酒炒雷丸乾漆火煅煙盡黃連酒炒使君子肉枳實麩炒木香厚朴薑汁炒蘆薈各三錢上為末老米糊為丸如緑豆大滾湯下加減看兒大小益脾散治泄瀉蒼白術厚朴薑汁炒人參茯苓各一兩甘草三錢炙白芍陳皮各一錢砂仁二錢山藥五錢老米五合蓮子肉去心五錢上為細末每服三五錢滾水調下消積丸木香二錢山楂二兩去殼麥芽二兩炒川芎一兩乾漆一兩火煅厚朴一兩薑汁炒黃連一錢薑汁炒枳殼三錢去蘘炒上為末糊丸如緑豆大每服一二十丸白湯下內消丸治四肢浮腫青皮五錢巴豆七錢去油木香一錢防己錢半丁香十四個上以巴豆同青皮炒蒼色去豆不用入前藥同為末飯丸如黍大男用陳皮湯下女用艾葉湯下連床散治癩頭瘡及遍身陰囊作癢抓出黃水痛甚黃連去蘆五錢蛇床去殼二錢半五倍子一錢二分輕粉二錢五分上為末先用荊芥蔥白煎湯洗拭乾用清油調敷六神丹治潮熱風痰天花粉石膏白附子滑石各三錢硃砂青黛各一錢上為末薄荷燈心茶湯下清金散治鵝口疳走馬疳鎖口疳青黛五分硼砂五分黃柏枯礬雄黃各五分飛丹冰片各一錢銅緑三分上為細末井水調敷口中白玉散治赤遊丹毒寒水石煅存性水飛過二兩朴硝二兩青黛三錢甘草三錢薑黃一兩當歸一兩柏末二錢上為末用芭蕉根汁加蜜調以鵝翎掃上干即再敷如金散治疥癬寒水石火煅水飛無名異銅青飛丹水銀輕粉大楓子苦參柏末枯礬雄黃各等分上為末蠟燭油調搽從腹上搽起無價散治面上生瘡疳瘡耳疳煙岸枯礬柏末飛丹各等分上為末用香油調搽導滯湯治瀉痢初起當歸黃芩大黃檳榔白朮甘草黃連桂枝白加姜赤加甘草胃弱去大黃加白朮土炒上㕮咀姜三片空心溫服一方治月蝕瘡薔薇根四錢地榆皮二錢輕粉三分上為末用鹽湯洗淨後敷此藥一方治鍛鍊瘡煅銀罐子一個輕粉五分上為末油調搽濕則乾摻一方治走馬疳雞內金燈燒存性黃柏白礬麝香上為未用米泔水攪貼口中一方治湯火瘡用蛤蟆二十個用木油或桐油煎蟆取油搽效一方治夜啼用黑牛生為末水調敷臍下一方治口渴潮熱馬前子一個礞石一塊煅白水磨服一方治潮熱寒水石三錢硃砂五分半滑石一兩甘草六分上為末冷水調服一方治肚痛用萊蔔子煎湯服或炒為末抹乳上令幾吮飲之一方治舌上出血牙硝一錢發余一分敷在舌上效
