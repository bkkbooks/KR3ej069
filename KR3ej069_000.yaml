front:
  text: 小兒椎拿活嬰祕旨序余專心慈幼幾二十餘年每患藥餌為小兒之所苦思得是術以佐理之然博採群書俱繁冗沓雜茫不知所從事今幸逢洪都舒時卿手授茲集在龔雲林先生當日已經三刻其書大行慨自我清定鼎兵燹屢經之餘是集概不見傳書版久廢余與舒時老暨張友開翁因舊本次序紊淆三面訂定重刻行世亦以志周先生之功虧不朽而見舒氏之世傳為非虛云皇清康熙五十年辛卯秋鵝湖王大卿題小兒推拿方脈活嬰祕旨全書序夫醫業一十三科貴妙通玄之祕病情百千萬變當原感受之因然醫豈易言哉且世之業醫者良多而求窮醫之道明醫之理窮病之原察病之變者幾希此蓋以藝視醫不以道視醫蓋由未盡儒者道故也若悟真子幼稱英敏志期向素習於儒業登作者壇後遊金陵客於繁陽歸而徙儒就醫考古證今通玄入妙更精於兒科推拿尤獨步也豫也壯遊楚洛南歷開閩過踵陵之不得聞悟真子名矣因踵其門扣其倚聆其音窺其赤果深入岐黃之域更精研秦越之書且夕寓焉每於風霜月夕之下相與談素問皆得師授而諳理奧出手澤一編乃推拿方脈之書真兒科之切要者豫因閲是書而知悟真子之心果悟真矣推小兒之稟賦察病受之淺深知藥石之難投審經絡之可據拿經點穴瀉實補虛透徹詳明奚啻夜光之璧通函察隱不減照乘之珠因勸之付梓人以廣其傳逐授筆書於首云康熙甲午年孟春月重鐫
