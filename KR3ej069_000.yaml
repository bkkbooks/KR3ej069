body:
  text: 敘余曰育養小兒難事也讀康誥保民如保赤誠求可知矣蓋因體骨未全血氣未定臟腑薄弱湯藥難施一有吐泄驚風痰喘咳嗽諸症誤投藥餌為害不淺唯推拿一法相傳上帝命九天玄女按小兒五臟六腑經絡貫串血道因其寒熱溫涼用夫推拿補泄一有疾病即可醫治手到病除效驗立見詢保赤之良法也但此專用醫者之精神力量不若煎劑丸散三指拈撮便易從事故習學者少而真傳罕覯矣豫得此良法祕書已久歷試都驗不忍私藏意欲公世因而手著最為詳晰分為上下二卷養育之家開卷瞭然隨用之效育嬰妙法盡載斯編矣康熙辛未年重刊繡谷龔雲林書於保仁堂
