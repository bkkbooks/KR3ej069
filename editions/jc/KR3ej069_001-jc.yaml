body:
  text: 卷一總論嘗聞小兒方脈科古人謂之啞科最難調治何也蓋嬰童之流難問症察脈故耳抑且臟腑脆嫩孟浪之劑峻寒峻熱不敢輕試且兒在襁褓內無七情六慾交戰外無大風大寒相侵何嬰兒疾繁且甚歟大抵半胎毒半傷食也其外感風寒什一而已曰臍風胎驚痘疹斑瘡驚癇發搐痰壅赤瘤白禿解顱鵝口重舌木舌諸症豈非孕母不謹胎毒所致歟且小兒在胎母飢亦飢母飽亦飽辛辣適口胎氣隨熱情欲動中胎息輟躁或多食煎煿恣味辛酸嗜欲無節喜怒不常皆能令兒受患母既胎前不節胎後又不能調惟備姑息未足百啐餌以酸鹹未彀甫周啖以肥甘百病由此而生矣曰吐瀉黃疸五疳腹脹腹痛水腫瘧痢痰喘豈非乳食過傷調養失宜所致歟此古者婦人妊子寢不側坐不邊立不蹕不食邪味不聽淫聲不視邪色有旨哉幼幼之法必深得造化生生不息之意此古人多壽考兒少夭折也有等稟性溫良之婦有娠不嗜欲縱口生兒少病而痘疹亦稀為兒醫者臨症之際宜察色觀形不宜鹵莽如頰赤知心熱鼻紅知脾熱左腮青知肝氣有餘右腮白知肺經不足頦白知腎虛更參虎口三關之脈小兒病情斯過半矣蒸變論小兒初生血氣未足陰陽朱調骨骼未全故有蒸變之候每三十二日一變六十四日一變蒸變則精神易蒸則骨骼成或發熱或吐或汗呻吟不食煩啼鼻塞咳嗽痰涎變候七日蒸過十三初變腎水志身熱耳骫冷二變一蒸膀胱上唇腫如臥蠶三變心火學笑生驚悸四變二蒸小腸渾身壯熱而硬五變肝木夜多啼哭六變三蒸在膽學坐閉目生驚搐七變肺金學語牙齒生八變四蒸大腸學硑噴嚏泄瀉九變脾土吐瀉識人知喜怒十變五蒸屬胃微汗腹痛呼父母心包三焦無形故無蒸變五蒸十變天地生成之數全矣八蒸者後三大蒸漸學移步能應名共五百零十二日變則手足受血足能行而手能持亦有胎氣壯實喑變而無諸症者此骨節臟腑由變而全而胎毒亦由變而散也驚風論經云諸風掉眩統屬肝木小兒純陽真水未旺心火已炎故肺金受制無以平木故肝木有餘而脾土常不足也失於保養塞暄不調以致外邪侵襲飢飽失節以致中氣損傷而急驚慢驚之候作矣故急驚屬肝風木有餘之症慢驚屬脾中土不足之候有餘則清之瀉之不足則溫之補之急驚之症因聞霹靂之聲或騾馬禽獸之唬以致面青口噤聲嘶發厥過則容色如常良久復作身熱面赤引飲口鼻氣熱二便黃赤惺惺不睡蓋熱盛生痰痰盛生風因驚而發耳慢驚之症因飲食不節損傷脾胃吐瀉日久中氣大虛發搐無休身冷面黃不渴口鼻氣寒二便清白露睛昏睡目上視手足瘛瘲筋脈拘攣蓋脾虛生風風盛則筋急即天吊風是也錢氏謂急驚無陰之症心經實熱陰不能配陽為陽盛陰虛之候慢驚是無陽之症脾土虛甚火不能勝水為水甚火虛之候故急驚者十生一死慢驚者十死一生當諳此理不可混作一途諸疳論經云數食肥令人內熱數食甘令人中滿蓋其病因肥甘之所致故名曰疳夫襁褓中之乳子與四五歲之孩提乳哺未息胃氣未全而穀氣未充也不能調助惟務姑息舐犢之愛恣良肥甘瓜果生冷一切烹飪調和之味朝餐暮飧漸成積滯膠固以致身熱體瘦面色痿黃肚大青筋蟲疰瀉痢諸疳作矣吐瀉論經云諸嘔吐酸暴注下迫皆屬於熱又曰濕盛則濡泄夫小兒吐瀉皆由乳食過度冷熱不調脾胃不和傳化失常停滯於內外感寒熱而吐瀉作矣瀉黃嘔逆為熱瀉清吐乳為寒須認切當可也嬰童賦乾元好生坤元長養人稟陰陽天地囊龠父精母血以成形天清地濁而升降顧一月之胎形如珠露二月之胚痕若桃花三月四月而男女形象分明五月六月而五臟六腑具足七月髮發生而關竅通八月動其手而遊其魂九月兒身三轉十月母妊當分兒在胎而餐母血母嗜欲最要提防母寒子寒母熱子熱男女初生調理須要得宜腸胃未充飯食不宜哺啜六七日臍帶未乾縱炎熱休頻浴水或緣客氣相沖遂染臍風惡候盤腸疝氣撮口噤風皆因風火為殃未滿十朝難治若是初生形如啞子緣母飲冷寒入肺經晝夜啼哭徹曉皆由熱盛心驚癬疥多因胎熱身黃名曰胎黃馬牙疳七星丹針而復繳木舌風重舌風刺而後敷更有蒸變骨骼乃成三十二日一變六十四日一蒸八蒸十變志意漸生長智長骨能應能行是兒暗行蒸變必緣稟賦完全胎驚內釣夜啼聲多屬臟寒瀉青瀉黃兼吐乳須分寒熱雖云驚症多般大抵風痰食熱發為搐搦咬牙寒戰變為循衣眼竄筋攣治法導食豁痰作主清心瀉木為先更有慢驚起於脾虛露睛昏睡身寒虛變脾風速死天釣驚抽眼目痓癇取下風痰更有諸疳多傷食積心肝脾肺腎五臟異症丁奚哺露症急治尤難痢乃物積氣滯瘧分邪客水火肚痛當分虛實吐乳總曰胃寒解顱語遲夜滯頤蓋是原虛口瘡鵝口癩頭瘡原由胎毒赤瘤火眼皆從火熱囟高囟陷咎歸脾虛如斯古怪更為何因豈非乳母不善調治致兒百病叢生者乎臨症三思診視庶幾起死回生面部險症歌額上紅多熱燥多若逢青色急驚疴形如昏暗多應死青貫山根奈若何囟門腫起定為風此候應知最是凶忽陷成坑如盞足不過七日命應終印堂青色搐驚多紅主心驚白主和或見微微青紫色只因容忤症相過山根青現兩遭驚紫色傷脾吐瀉因紅色夜啼聲不歇若逢白色死之形年壽黃為吐瀉基若然㿠白是為虛兩頤赤為啼哭熱更兼黃色吐因之鼻準微黃紫庶幾深黃死症黑應危人中短縮緣吐利黑形唇反定難醫鼻門黑燥渴難禁面黑唇青命不存肚大青筋俱惡候更嫌身有直身紋唇上鮮紅潤者平燥乾紅熱即黃生白形失血青驚重黑紋繞口死之徵承漿青色食時驚黃多吐逆是真形煩躁夜啼青主吉金匱青生亦主驚青脈生於左太陽須驚一度見推詳赤是傷寒微燥熱黑青知是乳多傷右邊青脈不須多有則頻驚怎奈何紅赤為風抽眼目黑青三日見閻羅忽見眉間紫帶青看來立便見風生青紅碎雜風將起久病眉紅是死形白睛青色有肝風有積黃形不及瞳若見黑精黃色現傷寒發疽是其蹤兩頰風池二氣黃躁啼吐逆色鮮紅更如火煅還多燥肺家客熱死非空兩頰黃為痰塞咽青色肝風紅主熱赤是傷寒黃主淋二色精詳分兩頰左腮紅為痰氣盛右腮紅是風寒症面而黧黑危急形面帶微紅驚且熱面白黃多吐利因面青唇白急驚成面白唇青方瘧疾面多白色腹中疼面紅唇赤是傷寒面目皆黃濕熱端面黃弄舌心煩躁面腫虛浮咳利干兩眉紅主夜啼多眉皺頭疼痢疾呵眼胞浮腫咳之久不爾因疳瘧痢疴瞑目昏昏似睡兮不轉睛而半露徵縱開目內無光彩此症由來號慢脾耳輪乾燥骨蒸容耵聹耳內自流膿耳輪冰冷知麻痘耳後紅絲縷亦同鵝口口中皆白垢脾熱必然多口臭魚口鴉聲最不祥舌唇黑色應難救口張出舌是驚風重舌木舌熱干中舌上生舌陽毒結舌上生芒刺亦可舌上白滑亦難醫舌上黑胎全不和舌上黑色命將休舌卷難言死可知咬牙寒戰痘瘡傳牙根出因是牙鮮牙根白色瀉痢急齒嚼咬人不久延牙稿焦枯脾熱致牙折腎經疳積是牙床癢塌咬牙疳牙關緊急驚風使口沫啼叫蟲痛乎涎來清白胃寒虛吐涎黃水非良候壅塞風痰吐盡奇呵欠面黃脾土虛面青呵欠是驚迷面紅呵欠為風熱呵欠久病陰陽離呵欠氣熱是傷寒呵欠喘急傷風傳多眠呵欠因疲倦呵欠煩悶痘瘡傳險症不治歌小兒症候要佔詳閉目搖頭搐一場鼻頭汗出兼吐痛手抱胸前畢竟亡白膜侵入瞳人內四肢不收候可傷指上黃紋青驚變魚口鴉聲不久長太陽青筋生入耳定睛魚口亦非良赤脈貫睛非吉兆舌紋目下亦多殃莫教口鼻蛔蟲黑鴉聲啼哭是難量胸陷唇乾手足冷掌冷頭低亦主亡此時縱惜如珍寶也須頃刻葬荒岡面部捷徑歌此色與三關看法同舌紋交錯紫兼青急急求醫免命傾盛紫再加身體熱定知啼哭見風生紫少紅多六畜驚紫紅相併即疳成紫點有形如米粒傷風積食證堪評紫散風傳脾臟間紫青口渴是風癇紫隱深沉難療治風痰祛散命須還紅赤連兮赤略輕必然乳母不相應兩手忽然無脈見定知沖惡犯神靈黑輕可治死還生紅赤傷寒痰積停赤青脾受風邪症青黑脾風作慢驚小兒無患歌孩童常體貌情態自殊然鼻內干無涕喉中絕沒涎頭如青黛染唇似點朱鮮臉方花映竹頰綻水浮蓮喜引方才笑非時手不掀縱哭無多哭雖眠未久眠意同波浪靜性若鏡中天此候俱安吉何愁疾病纏夭症歌身軟陽痿頭四破臍小臍高肉不就髮稀色脆短聲啼遍體青筋俱不壽尻腫臏骨若不成能踞能行皆立逝面部五色歌面赤為風熱面青驚可詳心肝形見此脈症辨陰陽脾肺黃疳積虛寒㿠白傷若逢生黑氣腎敗即須防虎口三關察症歌欲知虎口何處是男左女右第二指先分風氣命三關細察根源尋妙理初得病時見風關稍進驚痰氣關裡若到命關直透時危急存亡須審視色紅易療紫則進青極變黑終不治紋青枝紫傷風症紋紫枝紅傷寒病肺熱時結紅米粒黑色透唇傷暑論青紋瀉痢胃家寒白色微微卻是疳枝赤涎潮胸否膈黃紋隱隱困脾端枝形恰似垂釣樣風寒二症分其向向外傷風有汗形向內傷寒無汗恙關上枝青魚刺形驚疳虛風三部分枝直懸針青黑色水驚肺熱慢脾並枝如水字三關有咳嗽積滯風疳久枝如乙字青紅紋總是驚風慢脾咎一曲如環乳食傷兩曲如鉤冷之端三曲長蟲傷硬物雙鉤脈樣定傷寒枝形或若似彎弓如環如蟲又不同亂紋十物如川字食積疳成五臟風虎口脈紋五言獨步歌虎口脈紋多須知氣不和色青驚積聚下亂瀉如何青黑慢驚發入掌內吊多三關若通度此候必沉疴青紅驚急症黃黑水傷殘紫色生驚搐紅筋熱在肝關中存五色節節見紋斑風關通九竅色色是風紋關中青與白定是食傷生氣關從氣論因氣便成形未過三關節相逢可賀生命關生死路風氣兩相攻過了三關節良醫總是空五指梢頭冷驚來不可當梢頭如火噴原因食傷夾若逢中指熱必定是傷寒中指獨自冷麻痘症相傳紅紋如線樣傷風發搐驚右手病在臟食傷驚積生紋見三叉祥生痰夜作聲有青並有黑吐瀉搐非輕赤多因隔食青是水風傷筋紋連大指陰症候相當懸針主瀉吐生花定不祥手足軟腹脹吐乳乳之傷魚口鴉聲現犬咬並人傷黑時因中惡白疳黃脾傷青色大小曲人驚並四足赤色大小曲水火飛禽撲黃紫大小曲傷米麵魚肉黑色大小曲脾風來作搐囟門八字天三關驚透亡黑目相沖惡掌冷亦堪傷手足麻冷死歪斜恐難當口意心拽並氣吼此兒亡鼻紅兼嘴黑華胥入夢鄉五臟主病歌心經熱盛定癡迷天河推過到陽池肝經有病人多痹推動脾土病能除脾經有病食不進推動脾土病必應肺受風寒咳嗽多可把肺經久按摩腎經有病小便寒推動腎水即救得大腸有病泄瀉多大腸推抹待如何小腸有病小便閉橫門𦙀門推可記命門有疾原氣虧脾土太陽八卦為三焦主病多寒熱天河六腑神仙訣膀胱有病作淋疴腎水八卦運天河膽經有病口作苦只從妙法推脾土胃經有病寒氣攻脾土肺金能去風掌上諸穴拿法歌三關出汗行經絡發汗行氣是為先大腸側推到虎口止瀉止痢斷根源脾土宜補直為清飲食不進此為魁泄痢羸瘦並水瀉心胸痞氣塞能開掐心經絡節與離推離往乾中要輕胃風咳嗽並吐逆此經推效抵千金腎水一紋是後谿推上為補下為清小便閉塞清之妙腎經虛便補為奇六腑專治臟腑熱遍身潮熱大便結人事昏沉總可推去病猶如湯潑雪總筋天河水除熱口中熱氣並括舌心經積熱火眼攻推之即好真秘訣四橫紋和上下氣吼氣肚痛皆可止五經能通臟腑熱八卦開胸化痰逆胸膈痞滿最為先不是知音莫可傳水火能除寒與熱二便不通並水濕人事昏沉痢疾攻疾忙須救要口訣天門虎口須當竭𦙒肘生血順是妙一指五指節與推驚風被唬要須知小天心能生腎水腎水虛少須用意𦙀門專治氣發攻扇門發汗熱宜通一窩風能治肚痛陽池專一治頭疼二人上馬清補腎威靈卒死可回生外勞宮治瀉用之拿此又可止頭疼精靈穴能醫吼氣小腸諸氣快如風掌面推法歌一掐心經二勞宮推上三關汗即通如若不來加二扇黃蜂入洞助其功側掐大腸推虎口螺獅穴用助生功內傷泄痢兼寒瘧肚脹痰吼氣可攻一掐脾經屈指補艮震重揉肚脹宜肌瘦面若帶黃色飲食隨時而進之腎經一掐二橫文推上為清下補盈上馬穴清同此看雙龍擺尾助其功肺經一掐二為離離乾二穴重按之中風咳嗽兼痰積起死回生便晌時一掐腎水下一節便須二掐小橫文退之六腑涼將至肚膨閉塞一時寧總筋一掐天河水潮熱周身退似水再加水底撈明月終夜孩啼即住聲運行八卦開胸膈氣喘痰多即使輕𦙀門重揉君記取即時飲食進安寧眼翻即播小天心望上須當掐下平望下即宜將上掐左邊掐右右當明運土入水身羸瘦土衰水盛肚青筋運水入土膨脹止水衰土盛眼將睜陰陽二穴分輕重寒熱相攻瘧痢生痰熱氣喘陰重解無吼無熱用陽輕運動五經驅臟腑隨時急用四橫文掌背穴治病歌掌背三節驅風水靠山剿瘧少商同內外間使兼三穴一窩風止頭疼功頭疼肚痛外勞宮潮熱孩啼不出聲單掐陽池頭痛止威靈穴掐死還生一掐精靈穴便蘇口歪氣喘疾皆除內間外使平吐瀉外揉八卦遍身疏二十四驚推法歌兔絲驚主口括舌四肢冷軟心家熱推上三關二十通清腎天河五十歇運卦分陰亦三十二十水底撈明月蔥水推之蛤粉擦手足中心太陽穴洗口米泔仍忌乳頃刻其驚潛咸滅馬蹄驚主肢向上四肢亂舞感風嚇推上三關五十通三次掐手五指節補脾運卦四橫文各加五十無差迭走磨搖頭三十遭天門入虎神仙訣姜水推之生冷忌上馬揉之汗不歇水瀉驚主肚中響遍身軟弱嘴唇白眼翻寒熱不調勻推上三關加半百補脾運卦五十遭天門入虎三次訣橫文四十𦙒揉十大蒜細研重紙隔敷臍大久小片時風乳飲食皆忌得鯽魚驚主吐白沫肢搖眼白因寒唬十三關上好追求肺經走磨五十歇八卦四十橫紋二四次掐手五指節上馬三遭茶洗口蛤粉塗頂驚自滅烏紗驚主唇肢黑面有青筋肚作膨食後感寒風裡唬三關五十逞奇能運卦補脾並補腎半百還揉二扇門分陰二十橫四十二十黃龍入洞增麝香推罷忌乳風虛汗來多補土行烏鴉驚大聲即死眼閉口開手足舞此是痰多被唬驚三關二十應無苦推肺運卦分陰陽補腎橫文五十主按弦走磨只三次天心一掐蔥姜補細茶洗口取微汗蛤粉塗頂忌乳風肚脹驚氣喘不寧青筋裹肚眼翻睛此子只緣傷乳食二十三關即效靈大腸陰陽並八卦補脾補腎半百勻天門虎口只三次五十橫文最有情二十水底撈明月蔥姜推取汗頻頻搗蔥用紙重包裹敷向胸前忌乳風潮熱驚多生氣喘口渴昏迷食感寒推關六腑各六十河水陰陽四十完八卦橫文須半百三次天門入虎看薑蔥推汗泔洗口茱萸燈草腳心安一哭一死驚夜啼四肢掣跳起登時有痰傷食仍傷熱八卦三關二十施分陰陽清天河水六腑清涼半百奇橫文四十推鹽水薄荷煎湯口洗之生冷乳時須禁忌搽胸用蛤更敷臍縮沙驚至晚昏沉人事不知口眼掣痰症三關四十推八卦三十腎二百虎口陰陽五十勻指節一百為真訣揉臍一十麝香推蛤搽手足風忌得研茶作餅內間敷洗口還須湯滾白臍風驚主口吐沫四肢掣跳手拿拳眼翻偏視哭不止三關一十問根源運卦清金並補腎龍戲珠背五十圓指節數番姜水抹米泔須用洗丹田慢驚咬牙眼不開四肢掣跳脾虛是八卦三關五十通天門指節數番治補腎五十十走磨天心揉之風乳忌急驚捏拳四肢掣口歪驚主感風寒一十三關五十腑補腎推橫五十完運卦走磨加二十威靈掐穴汗漫漫推時更用蔥姜水洗口燈心忌乳寒彎弓驚主肢向後肚仰上哭不出聲痰積三關推二十五十須當把肺清入水走磨加數次一十天門入虎真麝香水推荷洗口百草霜敷治噤聲眼睛向上天吊驚哭聲大叫鼻流清清肺推關並運卦推橫補土又分陰各加五十無差別走磨二十掐天心推用蔥姜尤忌乳宗因水唬致驚深內吊咬牙苦寒戰掐不知疼食後寒推關清腎仍清肺補土五十一般般天門虎口加二十摘果猿猴半百完推用麝香甘草洗忌風生冷乳兼寒胎驚落地或頭軟口噤無聲啞子形胎毒推關兼補腎補土清金半百勤橫文二十威靈掐虎口天門數次靈燈火頂頭燒一燋湧泉一燋便安寧蔥姜推後應須退不退應知是死形月家驚撮口拿拳眼紅不響抹三關橫文陰陽皆二十運卦清金半百玄取土入水運數次指節數次二人連蔥姜推後燈芯洗蛤粉敷兩太陽邊盤腸氣喘作膨脹人形瘦弱肚筋青臟寒運卦推關上指節橫文補腎經補脾五十天心掐外勞揉之立便輕艾餅敷臍蔥水抹麝香搽向腳中心鎖心驚主鼻流血四肢冷軟火相侵推關補腎天河水運卦天門五十真清肺分陰各二十米泔洗口麝香淋蛤粉細研搽兩額還敷手足兩中心鷹爪掐人眼向上哭時寒戰眼時光肺風被嚇仍傷食二十三關分陰陽清金補土橫文等各推五十用生薑走磨入土皆數次取肝燈芯洗口湯撤手驚主手足掣咬牙歪口被風嚇心熱推關二十通運卦資脾加半百橫文指節及天門各加數次為準則走磨一十蔥姜推取汗微微驚自歇仍將蛤粉搽手心洗口茱萸須記得袒手驚主手袒下眼黃口黑麵紫青舌動只因寒水唬五十三關把肺清補腎橫文入虎口八卦天河半百經入水數次姜推汗麝香敷向湧泉真洗口細茶忌風乳卻能起死致安寧看地驚主眼看地手掐拳時心熱真八卦橫文皆五十三關一十掐天心虎口𦙀門皆數次蔥姜洗口用燈芯雜症推拿歌吐逆四肢冷肚響吐乳須知胃有寒三關水火各二十清金清腎四橫文八卦各皆加半百數次天門虎口完十揉𦙒肘椒蔥汁茱萸蛤粉腳心安肚痛三關推一十補脾二十掐窩風運卦分陰並補腎揉臍入虎口中心各加五十掐指節𦙒肘當揉二十工艾敷小肚須臾止虎口推完忌乳風火眼三關把肺清五經入土撈明月各加二十𦙒肘十清河退腑水陽穴五十橫文十戲珠兩次天河五指節氣腫天門是本宗橫文水腫次詳閱虛腫肚膨用補脾此是神仙真妙訣黃腫三關並走磨補腎皆將二十加補土橫文皆五十精靈一掐服山楂推時須用蔥姜水殷勤臍上麝香搽走馬疳從關上推赤鳳陰陽一十歸清河運卦兼撈月各加五十麝香推燒過倍子同爐底等分黃連作一堆頭痛一十向三關清土分陰並運卦橫文及腎天河水太陽各安五十下陽池一掐用蔥姜取汗艾葉敷頂上痰瘧來時多戰盛不知人事極昏沉陰陽清腎並脾土五十麝香水可尋走磨橫文各二十桃葉將來敷腳心食瘧原因人瘦弱不思飲食後門開一十三關兼走磨補土橫文五十回𦙒肘一十威靈掐上馬天門數次歸邪瘧無時早晚間不調飲食致脾寒上馬三關歸一十補脾補腎掐橫文五十推之加𦙒肘威靈三次勸君看陰陽二關須詳審走氣天門數次攢白痢推關兼補脾各加五十掌揉臍陰陽虎口仍揉肘二十清腸取汗微蔥姜少用揉龜尾肚痛軍姜貼肚皮赤痢三關推一十分陰退腑及天河橫文五十皆相等揉掌清腸龜尾摩半百各加姜水抹黃連甘草起沉疴痢兼赤白抹三關陰陽八卦四橫文龜尾大腸揉掌正揉臍五十各相安蔥姜推罷忌生冷起死回生力不難痞痢推關補脾土五節橫文二十連退腑一百鹽揉否螺獅艾葉及車前細研敷向丹田上白及將同牛肉煎熱瀉推腸退六腑八卦橫文及掌心揉臍五十同清腎姜水推之立便輕冷瀉推關及大腸運卦分陰補腎鄉各加五十推姜水走磨指節並臍旁掌心數次同龜尾此是先賢治瀉方傷寒潮熱抹三關六腑陰陽八卦看清腎天河加五十數次天門入虎鑽五指節當施五次蔥姜推罷立時安吐法天河撈明月數番六腑五指節螺獅苜蓿貼丹田大瀉大腸真妙訣小便不通用蜜蔥作餅敷囊淋自泄若將搗爛貼丹田此法能通大便結驗症加減法小兒初生月胸膈手頻翻此病號領膈父母惜兒難心中有痰氣不轉面黃眼直視不食肚上青筋用滾痰丸一行隨用石膏燒末蜜湯下小兒初生月肢體瘦無涯頭角毛稀少原因鬼主胎小兒初生月七吼血流鮮指甲唇毛缺胎中損莫收小兒初生月兩眼爛其弦此症胎中熱驚風最是先此肝經有熱眼目赤腫鼻氣急口吐涎痰先服滾痰丸後用寒水石方四黃散治之切不可點小兒初生月啼哭作鴉聲瀉下如藍色胎中更積驚此心中有驚拿十二經絡服鎮驚丸薄荷湯下後用桃紅散燈心湯下小兒初生月吐浮熱中胎不識常乳哺原因是吐來此兒受寒眼目青四肢冷先吐後瀉用通關散吹入鼻中次用捉虎丹治上瀉後用平胃散治下小兒翻吐後搐熱氣長吁此病知醫療其原號胃虛此體弱元氣虛不思飲食肌肉不生益黃散治之小兒驚吐後食物不過喉目定渾身腫看看命不留小兒驚熱重吐瀉後心煩赤點連皮腫醫人仔細看吐瀉後熱泄陽發在外不能退熱先拿經絡後用薑湯磨滾痰丸定搐用通關散吹入鼻中小兒初得病體熱目皮張父母憂驚死醫人見識長拿左手右足用通關散吹之小兒驚積後最要補腸中此病虛中積久病更加膿肚腹溏泄無常有積滾水下千金丸後用平胃散補之小兒驚泄久眼慢困沉沉手足時加搐良醫謂慢驚泄久脾虛睡臥不醒屬內寒矣與急驚相似不可用涼藥用薑湯磨牛黃丸後用益黃散治之小兒驚泄後偃蹇若風癱此氣為中療醫人仔細看此症難識先用通關散吹之不開不治開則用降痰丸治下開關散細辛麝香皂角兒小沉久病慢慢患無時欲死頻來去經云號慢脾眼目望上即同天吊驚風先服滾痰丸後用寒水石治之小兒驚風重走注四肢癱作熱時加搐驚來淚不幹四肢無力日夜啼哭拿十二經絡用燈芯湯送牛黃丸小兒腸冷後時熱復加驚咳嗽痰成壅看看啼沒聲眼珠黃心中痰結聲氣閉塞用黃荊子湯下滾痰丸熱退用伏龍肝煎湯下山豆根青礞石即愈小兒初生月噤口病非輕吃乳頻吐沫須令父母驚此名噤風口噤眉蹙面紅大聲三日去臍作臍風論風在皮無藥治之小兒初生月腹緊哭聲長此氣胎中受經云號鎖陽此腹緊作夜啼用燈心膏湯治之小兒初生月舌縮哭聲沉愚者何能識驚痰上鎖心此痰與積病相同用滾痰丸治之十二手法主病賦黃蜂入洞治冷痰陰症第一水底撈明月主化痰潮熱無雙鳳凰丹展翅同烏雙龍擺尾之功老翁絞𦌛合猿猴摘果之用打馬過天河止嘔兼乎瀉痢按弦走搓磨動氣最化痰涎赤鳳搖頭治木麻烏龍擺尾開閉結二龍戲珠利結止搐之猛將猿猴摘果祛痰截瘧之先鋒飛筋走氣專傳送之天門入虎之能血也十二手法訣黃蜂入洞法大熱一掐心經二掐勞宮先開三關後做此法將左右二大指先分陰陽二大指並向前眾小指隨後一撮一上發汗可用水底撈明月法大涼做此法先掐總筋清天河水後以五指皆跪中指向前眾指隨後如撈物之狀以口吹之飛經走氣法化痰動氣先運五經文後做此法用五指開張一滾一篤做至關中用手打拍乃行也按弦走搓磨法先運八卦後用二大指搓病人掌三關各一搓二指拿病人掌輕輕慢慢如搖化痰甚效二龍戲珠法用二大指二鹽指並向前小指在兩旁徐徐向前一進一退小指兩旁掐穴半表裡也赤鳳搖頭此法將一手拿小兒中指一手五指攢住小兒𦙒肘將中指擺搖補脾和血也中指屬心色赤故也烏龍擺尾法用手拿小兒小指五指攢住𦙒肘將小指搖動如擺尾之狀能開閉結也小指屬腎水色黑故也猿猴摘果法左手大指食指交動慢動右手大指食指快上至關中轉至總筋左邊右上至關上鳳凰單展翅法熱用大指掐總筋四指皆伸在下大指又起又翻四指如一翅之狀打馬過天河溫涼以三指在上馬穴邊從手背推到天河頭上與撈明月相似俗以指甲彈響過天河者非也天門入虎口法右手大指掐小兒虎口中指掐住天門食指掐住總筋以五指攢住𦙒肘輕輕搖動效寸口脈訣歌小兒有病須憑脈一指三關定其息浮洪風盛數多驚虛冷沉遲定有積小兒一歲至三歲呼吸須將八至看九至不安十至困短長大小有形千小兒脈緊是風癇沉脈須知乳化難腹痛緊弦沉實秘沉而數者骨中寒小兒脈大多因熱沉細原因乳食結弦長多隔肝風緊數寒驚四肢掣浮洪胃口似火燒沉疴腹中痛不歇虛滯有氣更兼風肺孔多痢大腸血臟腑三部脈來分但以浮沉遲數則風痰疾喜遲而浮急大洪數兒不瘳緊大邪氣風癇作弦急寒邪風冷求寒瘧脈弦而帶遲熱瘧脈弦而帶數下簡之脈喜細微浮大見時難用藥吐瀉順脈小而微乳後輒吐脈亂宜中暑霍亂喜浮大最嫌沉細與沉遲急驚之脈弦數急慢驚之脈宜沉細疳積診時洪大宜沉細必然無藥治水腫浮大得延生細沉難以望安寧吐衄腹痛沉細吉浮數弦長藥不靈緊數細快無他疾沉緩不能消乳食氣喘身熱宜滑淨脈澀四肢寒者危人門先知訣生死入門何處斷指頭中用掐知音此是小兒真妙訣更於三部看何驚虎口三關察脈圖紫熱紅傷寒青驚白是疳黑時為中惡黃即困脾端三關青鳥獸驚浮因風受沉因食受三關赤水驚浮因風受沉因食受三關黑是人驚浮熱在外沉熱在內凡諸文三關通度俱皆惡候然不越驚熱風痰而已運水入土能治脾土虛弱小便赤澀如脾土虛瀉痢即運土入水如小便赤澀即運水入土總筋屬土總五行以應脾胃主溫熱外通𦙀門周流一身壅塞之症及諸驚皆掐此赤筋屬火以應心小腸主霍亂作寒掐此青筋陽木以應肝膽主溫和通兩目赤澀紅生多淚掐此白筋濁陰屬金以應肺大腸通一身之竅微涼胸膈痞滿頭昏生痰退熱掐此黑筋重陰屬水應腎膀胱通兩耳主冷氣尪羸昏沉掐此掌面諸穴圖掐心一節及勞宮推三關能出汗後做黃蜂入洞心在中指內勞宮屈中指盡處是穴發汗用天河水在總筋下三指掐總筋清天河水水底撈明月治心經有熱橫文掐至中指尖主吐橫文在掌盡處無名屬肺掐肺一節及離宮節止咳嗽離至乾中要輕小指屬腎掐腎一節小橫文大橫文退六腑治小便赤澀運五經文治五臟六腑氣不和運四橫和上下不足之氣氣急氣喘腹肚疼痛大指屬脾掐脾一節屈指為補小兒虛弱乳食不進𦙀門在大指節下五分治氣促氣攻𦙀門推向橫文主吐橫文推向𦙀門主瀉橫文兩旁乃陰陽二穴就橫文上以兩大指中分望兩旁抹為分陰陽肚脹腹膨脹泄瀉二便不通臟腑虛並治運八卦開胸膈之痰結左轉止吐右轉止瀉天心穴乾入寸許止天吊驚風口眼歪斜運之效虎口對天門推之名天門入虎口推後二指拿定二穴一指掐住總筋以手揉𦙒肘是也清天河分陰陽赤鳳搖頭止夜啼掐中指一節及指背一節止咳嗽掌背穴圖掐五指背一節專治驚嚇醒人事百病離身掐大指少商穴治濕痰瘧痢靠山穴在大指下掌根盡處腕中能治瘧疾痰壅威靈穴在虎口下兩旁歧有圓骨處遇卒死症搖掐即醒有聲則生無聲則死一扇門二扇門在中指兩旁夾界下半寸是穴治熱不退汗不來掐此即汗如雨不宜太多精靈穴在四指五指夾界下半寸治痰壅氣促氣攻二人上馬在小指下里側對兌邊是穴治小便赤澀清補腎水外勞宮在指下正對掌心是穴治糞白不變五穀不消肚腹泄瀉一窩風在掌根盡處腕中治肚痛極效急慢驚風又一窩風掐住中指尖主瀉陽池穴在掌根三寸是治風痰頭痛外運八卦能令渾身酥通腳上諸穴圖膝眼穴小兒臉上驚來急在此掐之前承山穴小兒望後跌將此穴久掐久揉有效解谿穴又驚又吐又瀉掐此即止鞋帶穴小兒望後仰掐此效若小兒驚急掐人眼光掣跳寒戰咬牙將大指一節久揉即止掐左足右手又將手中指一節掐三下揉龜尾並揉臍治水泄烏紗膨脹臍風急慢等症後承山穴小兒手足掣跳驚風緊急快將口咬之耍久令大哭方止僕參穴治小兒吼喘將此上推下掐自然甦醒如小兒急死將口咬之則回生名曰老虎吞食五色不治歌青色如針兩目下良醫也須怕忽然腹痛面青時何必更求醫青色橫目及入耳此症應知死赤侵眉間死無疑七日可為期青色如針入口裡報君三日已黑色遮眉入繞目命殂何太速黑起眉間也不良十日定知亡人中黑色入口裡必做黃泉鬼眼目自閉睜睜開死信也將來水腫之病目輸黑報道腎經絕久咳唇白及繞頤死日不多時孩童吐血鼻塞白命殂救不得久病忽然面似妝不久見閻王目陷無光兼直視禍從三朝至更有瞳人不轉動休將良藥用口噤全然不進乳此病必難許瀉下之物如瘀血此兒休望活利久不食又咬人終與鬼為鄰瀉利不止熱又生如何想命回久吐不止止又吐此病人鬼數耳內生瘡黑斑出醫人休用術下糞黑色不止時不必望生期久嗽四肢皆厥冷備起棺木等小兒腹脹喘又粗終須向死途這般諸惡症枉費用工夫小兒牙關緊閉將夾車穴揉之自開正面部位歌中庭與天庭司空及印堂額角方廣處有病定存亡青黑驚風急體和滑澤光不可陷兼損唇黑最難當青甚須憂恐昏暗亦堪傷此是命門地醫師要較量額上屬心鼻準屬土左腮屬肝右腮屬肺下頦屬腎天吊驚眼向上不下將兩耳珠望下一扯一掐即轉肝驚起髮際肝積在食倉肝冷麵青白肝熱正眉端脾驚正髮際脾積唇應黃脾冷眉中嶽脾熱太陽侵肺驚髮鬢赤肺積髮際當肺寒人中見肺熱面腮旁腎驚耳前穴腎積眼包相腎冷額上黑腎熱赤食驚心驚在印堂心熱額角荒心冷太陽位心熱面頰妝撮口驚服乳即吐人事昏沉急須用燈火煅曲池各一燋虎口各一燋一窩中脘各七燋縮紗驚日輕夜重人事昏迷四肢軟如坐地用桃皮生薑飛鹽香油宮粉和勻推之兩膝委中內關穴上豬尾骨上各用燈火斷之雙眼翻白青筋氣吼撮口吐沫即死者急驚風也用燈火斷眉心一燋鼻梁一燋心演一燋兩手總筋各一燋兩足鞋帶穴各一燋以生薑香油熱推之慢驚風蓋因逐日被唬雨濕所傷驚恐所致露睛昏睡咬牙口歪心間迷悶多於吐瀉後得之掐住眉心良久太陽心演推之燈火斷眉心心演虎口湧泉穴各一燋香油調粉推之膨脹驚寒熱不均有傷脾胃飲食太過胃不克化氣吼肚膨肚上青筋兩眼翻白用燈火斷心演內三燋囟門三燋肚臍四燋兩膝二燋鞋帶各一燋總筋各一燋鯽魚驚因寒受風痰湧結吼氣不絕口吐白沫四肢舞眼白用燈火斷虎口各一燋囟門四燋口角上下四燋心演內一燋臍下一燋夜啼驚又名肚脹驚肚上青筋腹脹如鼓哭聲大叫一哭一死手足熱跳用生薑潮粉桃皮飛鹽推燈火斷眉心一燋平心三燋太陽各一燋囟門四燋喉下一燋臍風驚多在三朝一七內發五臟冷寒肚腹作脹兩口角起黃丹口內心演有白泡瘡挑破出血效燈火斷囟門四燋喉下一燋心平三燋挽弓驚因飲食或冷或熱傷脾胃失調理冷痰湧於肺經四肢向後仰上哭不出聲兩眼密閉如挽弓之狀燈火斷青筋縫上七燋喉下三燋繞臍四燋魚肚一燋胎驚因孕母食葷毒之物受勞郁之氣落地或硬或軟眼不開如啞子形是母腹中受胎毒也斷背脊筋縫上七燋頂上三燋喉下三燋繞臍四燋湧泉各一燋烏鴉驚因食乳哺被唬或吃冷物傷榮衛大叫一聲一死眼閉一掣一跳聞響即唬心經有熱用老鴉蒜燒過車前草擂水服燈火斷囟門口角各四燋肩井𦙒肘手掌各一燋心演鼻梁鞋帶一燋一方老鴉蒜燒為末心窩擦之烏縮驚因食生冷太過或迎風食乳血經變成沙行遍身四肢黑肚上青筋過臉腹脹唇黑內有寒主吐瀉用燈火斷青筋縫上七燋立效月家驚因母當風睡臥或月內受風痰湧心口落地眼紅撮口捏拳頭偏左右哭不出聲肚腹青筋氣急燈火斷胸前七燋繞臍四燋青筋縫上七燋百勞穴二燋天吊驚因母與之風處乳食所傷風痰經於胃口頭後仰腳後伸手後稱眼翻白向上燈火囟門四燋肩井二燋總筋鞋帶各一燋喉下二燋繞臍四燋用鵝一隻紮在傘下扎住鵝嘴取涎飲之效肚痛驚因生冷過多乳食所傷臟腑大寒身軟弱口角白眼翻四肢冷腹內痛身發顫用燈火斷肚臍四圍四燋看地驚因乳食受傷夜眠受驚飲食冷熱不調兩眼看地一驚便死手捏拳頭垂不起口歪咬牙用燈火斷喉下三燋囟門四燋繞臍四燋潮熱驚因失飢傷飽飲食不納脾胃虛弱遍身潮熱腳向後亂舞用燈火斷手上螺獅骨一燋虎口一燋繞臍四燋蛇絲驚因食無度口拉舌四肢冷口噙母乳一噴一口青煙肚上青筋起氣急用燈火斷胸前六燋小便頭上掐之用蛇蛻四足纏之便好馬蹄驚因與葷毒之物食之熱干脾胃頭向上四肢亂舞如馬舉蹄天心穴掐之心經掐之用燈火斷兩掌心並肩井各一燋喉下三燋臍下一燋鷹爪驚因乳食受驚夜眠受唬手抓人衣仰上哭聲大叫身體寒戰捏拳手爪往下口向上肺經有熱燈火斷頭頂眉心兩太陽掌心心演湧泉大敦穴各一燋繞臍一轉水瀉驚因寒熱不調肚中響而作痛兩眼白口唇白身體軟弱用燈火斷眉心一燋心演一燋總筋各一燋一窩風各一燋鞋帶穴各一燋頰車穴各一針撒手驚雙手袒下一撒即死咬牙口歪手足掣跳用燈火斷總筋各一燋一窩風各一燋內吊驚因食感寒咬牙寒戰眼向內翻人事昏沉掐不知疼用燈火斷囟門四燋心演內一燋兩手總筋各一燋迷魂驚昏沉不知人事咬牙一死先掐眉心鼻梁下後用燈火斷心演內一燋鞋帶穴一燋總筋各一燋補遺臍風論夫小兒驚症而臍風最酷誠為可畏其候鎖喉撮口俗云荷包風十無一生原因風濕所傷或因尿在衣內遂襲成風又因三五日臍落之後頻與之浴水入臍內變作盤腸痧氣作痛近時論云皆由臨盆之時產母立高小兒落地胞尚未來臍帶吊動肚皮脂膜以致血脈沸騰急脹如鼓風痰潮作更襲外風而撮口鎖喉噤風之症作矣用細辛為末或用烏梅蘸擦牙關吐涎便愈詳看肚臍四圍有紫黑筋形用小針挑出紫黑血愈用面作餅子貼臍中央艾火灸三四壯又法用燈火燒臍斷妙又法看口內喉演有白泡瘡如豆大挑破出血效刺泡法小兒初生下即死看兒口中前齶上有泡名曰懸癰以手指掐破用帛拭淨即活若血入喉即死回氣法初生氣欲絕不能啼者必是難產或冒寒所致急以棉絮包裹抱懷中未可斷臍帶且將包衣置炭火中燒仍作大紙條蘸清油點著於臍帶上往燎之兒得火氣由臍入腹更以熱醋湯洗帶須溲即回啼叫如常方可洗浴斷臍通便法初生下大小便不通腹脹欲絕者急令其母以溫水漱口吸咂兒胸背心並臍兩手兩足四心共七處凡三五次以紅赤為度須溲即通不然無生意貼囟法治初生時被風吹鼻塞服藥不退用南星為末生薑自然汁調成餅貼囟上自愈治初生下遍身無皮但是細肉宜速用白早米粉干撲候皮生乃止治小兒初生遍身如魚泡或如水晶碎則成水用密陀僧研極細末摻仍服蘇合香丸治七日腎縮乃初生受寒所致硫黃茱萸等分為末研大蒜調塗其腹仍以蛇床子微炒火燒煙燻
